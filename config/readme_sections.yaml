badge_labels:
  version: GPT Factory
  build: Build
  validation: Validation
  license: License
  platform: Platforms
statistics_sources:
  core_modules: core
  audiences: core/audiences/audience_profiles.yaml
  compliance_topics: core/compliance/compliance_rules.yaml
  ctas: core/cta/cta_library.yaml
  routing_tests: core/shared_tests/contact_and_referral_routing_tests.md
  action_tests: core/lead_capture/TEST_CASES.md
  platform_exports: exporters/platforms.yaml
  gpt_packages: gpts
  archived_source_documents: source_material/workspace
  portfolio_report: docs/reports/TOP_15_CUSTOM_GPTS_REPORT.md
  identity_profile: config/profiles/jeremy_mcdonald.yaml
  identity_pack: core/identity/identity_pack.yaml
  package_structure: core/templates/package_structure.yaml
excluded_paths:
  - .git
  - .DS_Store
  - gpts/templates
  - gpts/planned
  - gpts/blueprints
sensitive_path_patterns:
  - '(?i)(^|/)\.env($|\.)'
  - '(?i)(secret|credential|private[_-]?key)'
  - '(?i)(pipeline[_-]?reconciliation|borrower[_-]?(pii|data|records))'
maximum_current_portfolio_rows: 15
include_generated_timestamp: true
gpt_status_order: [planned, draft, pilot, approved, deprecated, archived]
